<!doctype html>
<html lang="es-MX">

  <meta charset="utf-8" >

  <title>Contacto - Hotel Quinta Dalam</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JafetSan37/Hotel_Quinta-PW@main/catalogo_styles.css">

</head>

<body>
  <header class="hero-top">
    <img class="hero-logo" src="src/logo.png" alt="Hotel Quinta Dalam" >
  </header>

  <div class="panel">
    <header class="panel-header">
      <nav class="nav" aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <span class="nav-sep" aria-hidden="true"></span>

        <a href="catalogo.html">Habitaciones</a>
        <span class="nav-sep" aria-hidden="true"></span>

        <a href="nosotros.html">Sobre Nosotros</a>
        <span class="nav-sep" aria-hidden="true"></span>

        <a class="active" href="contacto.htm" aria-current="page">Contacto</a>
      </nav>

      <h1 class="headline">Contáctanos</h1>
    </header>

    <main class="content">
      <section class="contact-card" aria-label="Información de contacto">
        <div class="contact-intro">
          <p class="contact-lead">
            ¿Tienes alguna duda o pregunta? <strong>¡No dudes en contactarnos!</strong>
          </p>
          <img class="contact-icon" src="src/contacto.png" alt="Ícono de contacto" >
        </div>

        <div class="contact-list">
          <div class="contact-row">
            <span class="contact-label">Teléfono</span>
            <a class="contact-link" href="tel:+524431574706">+52 443 157 4706</a>
          </div>

          <div class="contact-row">
            <span class="contact-label">Email</span>
            <a class="contact-link" href="mailto:contacto@quintadalam.com">contacto@quintadalam.com</a>
          </div>

          <div class="contact-row">
            <span class="contact-label">Dirección</span>
            <span class="contact-text">Calle #, Colonia, CP, Ciudad, Michoacán</span>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="social">
        <a class="social-link" href="https://www.facebook.com/profile.php?id=61584681841684" target="_blank" rel="noopener noreferrer" aria-label="Facebook de Hotel Quinta Dalam">
          <img src="src/facebook.png" alt="Facebook" class="social-icon" >
        </a>

        <a class="social-link" href="https://www.instagram.com/quintadalam?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" rel="noopener noreferrer" aria-label="Instagram de Hotel Quinta Dalam">
          <img src="src/instagram.png" alt="Instagram" class="social-icon" >
        </a>

        <a class="social-link" href="https://www.tiktok.com/@quintadalam?lang=es" target="_blank" rel="noopener noreferrer" aria-label="TikTok de Hotel Quinta Dalam">
          <img src="src/tiktok.png" alt="TikTok" class="social-icon" >
        </a>
      </div>

      <p class="copyright">
        &copy; Hotel Quinta Dalam, 2026<span id="year"></span>
      </p>
      <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px; align-items: center;">
        <a href="https://validator.w3.org/" target="_blank" rel="noopener noreferrer" title="Ir al Validador HTML de la W3C">
          <img style="border:0;height:31px;width:auto;" src="https://www.w3.org/assets/logos/w3c-2025/svg/margins/w3c-letters-bg-white.svg" alt="Validador HTML">

        <a href="https://jigsaw.w3.org/css-validator/" target="_blank" rel="noopener noreferrer" title="Ir al Validador CSS de la W3C">
          <img style="border:0;width:88px;height:31px" src="https://jigsaw.w3.org/css-validator/images/vcss" alt="Validador CSS">
        </a>
      </div>
    </footer>
  </div>

  <script>
    const yearEl = document.getElementById("year");
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  </script>

</html>
